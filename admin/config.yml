backend:
  name: git-gateway
  branch: main
  repo: EleazarFreitas/DecapCMS

local_backend: true

media_folder: "uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "home"
    label: "Home"
    files:
      - file: "content/home.yml"
        label: "Hero"
        name: "hero"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Subtítulo", name: "subtitle", widget: "string" }
          - { label: "Link", name: "link", widget: "string" }
          - { label: "Mídia", name: "media", widget: "file" }