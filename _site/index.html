
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Título inicial</title>
    <!-- Script do Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      body {
        margin: 0;
        font-family: Arial;
      }
      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
      }
      .media {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      
      
        <img class="media" src="/uploads/hero.jpg" alt="">
      
      <h1>Título inicial</h1>
      <p>Subtitulo inicial</p>
      
        <a href="https://example.com">Acessar</a>
      
    </div>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
